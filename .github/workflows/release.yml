name: Release

# Publishes @ageniti/core to npm with a verifiable provenance attestation.
#
# How to cut a release:
#   1. Bump "version" in package.json and update CHANGELOG.md, then merge to main.
#   2. Create a GitHub Release whose tag is "v<version>" (e.g. v0.2.0).
#      The workflow verifies the tag matches package.json before publishing.
#
# Requirements (one-time setup):
#   - Add an npm granular automation token as the NPM_TOKEN repo secret.
#   - The "id-token: write" permission below lets npm attach provenance,
#     which shows a verified supply-chain badge on the npm package page.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry-run:
        description: "Run everything except the actual publish"
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write # required for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify tag matches package.json version
        if: github.event_name == 'release'
        run: |
          PKG_VERSION="v$(jq -r .version package.json)"
          TAG="${GITHUB_REF_NAME}"
          echo "package.json: $PKG_VERSION"
          echo "release tag:  $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($TAG) does not match package.json version ($PKG_VERSION). Bump package.json or fix the tag."
            exit 1
          fi

      - name: Run tests
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Publish to npm (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry-run
        run: npm publish --provenance --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry-run)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
