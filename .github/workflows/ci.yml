name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Run tests
        run: npm test
        env:
          AGENITI_SKIP_NPM_PUBLISH_TEST: "1"

      - name: Verify package contents
        run: npm pack --dry-run --ignore-scripts --cache ./.npm-cache
